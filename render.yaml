services:
  - type: web
    name: novedad-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: APP_VERSION
        value: 1.0.0
      - key: APP_RELEASE_NOTES
        sync: false
